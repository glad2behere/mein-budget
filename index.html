<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Manager Pro</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231a73e8%22/><text xml:space=%22preserve%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-size=%2260%22 y=%2272%22 x=%2250%22 fill=%22white%22 font-weight=%22bold%22>€</text></svg>">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a73e8">

    <style>
        :root { --primary: #1a73e8; --danger: #d93025; --bg: #f0f2f5; }
        body { font-family: sans-serif; background-color: var(--bg); padding: 15px; display: flex; justify-content: center; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 480px; box-sizing: border-box; }
        h1 { text-align: center; color: var(--primary); margin-bottom: 10px; font-size: 1.4rem; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; font-size: 0.85rem; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        
        .expense-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .expense-row input[type="text"] { flex: 3; }
        .expense-row input[type="number"] { flex: 2; }

        .btn-delete { background: #fee; color: var(--danger); border: 1px solid #fcc; border-radius: 8px; padding: 10px; cursor: pointer; }

        .result-box { background: #e8f0fe; padding: 15px; border-radius: 12px; margin-top: 10px; border-left: 6px solid var(--primary); }
        .result { font-size: 1.1rem; font-weight: bold; text-align: right; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: bold; margin-top: 10px; }
        .btn-add { background: var(--primary); color: white; }
        .btn-export { background: #34a853; color: white; }
        .btn-import { background: #fbbc04; color: black; }
        .btn-clear { background: #f1f3f4; color: #5f6368; margin-top: 20px; font-size: 0.8rem; }
        
        #fileImport { display: none; } /* Versteckter Input für Datei-Wahl */
    </style>
</head>
<body>

<div class="container">
    <h1>Budget Manager</h1>
    
    <div class="input-group">
        <label>Monat wählen</label>
        <select id="currentMonth" onchange="loadFromStorage()">
            <option value="Januar">Januar</option><option value="Februar">Februar</option>
            <option value="März">März</option><option value="April">April</option>
            <option value="Mai">Mai</option><option value="Juni">Juni</option>
            <option value="Juli">Juli</option><option value="August">August</option>
            <option value="September">September</option><option value="Oktober">Oktober</option>
            <option value="November">November</option><option value="Dezember">Dezember</option>
        </select>
    </div>

    <div class="input-group">
        <label>Startbetrag (€)</label>
        <input type="number" id="startBudget" placeholder="0" oninput="calculate()">
    </div>

    <hr>
    <div id="expenseList"><label>Ausgaben</label></div>

    <button class="btn btn-add" onclick="addNewField()">+ Ausgabe hinzufügen</button>

    <div class="result-box">
        <div class="result">Rest: <span id="remaining">0.00</span> €</div>
    </div>

    <button class="btn btn-export" onclick="exportData()">Als .txt exportieren</button>
    
    <button class="btn btn-import" onclick="document.getElementById('fileImport').click()">Datei importieren (.txt)</button>
    <input type="file" id="fileImport" accept=".txt" onchange="importData(event)">

    <button class="btn btn-clear" onclick="clearAll()">Monat zurücksetzen</button>
</div>

<script>
    window.onload = () => {
        // Aktuellen Monat automatisch setzen
        const months = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
        document.getElementById('currentMonth').value = months[new Date().getMonth()];
        loadFromStorage();
    };

    function calculate() {
        const start = parseFloat(document.getElementById('startBudget').value) || 0;
        const amounts = document.querySelectorAll('.amount');
        let total = 0;
        amounts.forEach(i => total += parseFloat(i.value) || 0);
        const rem = start - total;
        document.getElementById('remaining').innerText = rem.toFixed(2);
        document.getElementById('remaining').style.color = rem < 0 ? "#d93025" : "#1a73e8";
        saveToStorage();
    }

    function addNewField(desc = "", val = "") {
        const div = document.createElement('div');
        div.className = 'expense-row';
        div.innerHTML = `<input type="text" placeholder="Bezeichnung" class="desc" value="${desc}" oninput="calculate()">
                         <input type="number" placeholder="€" class="amount" value="${val}" oninput="calculate()">
                         <button class="btn-delete" onclick="this.parentElement.remove();calculate();">✕</button>`;
        document.getElementById('expenseList').appendChild(div);
    }

    function saveToStorage() {
        const month = document.getElementById('currentMonth').value;
        const expenses = [];
        document.querySelectorAll('.expense-row').forEach(row => {
            expenses.push({ t: row.querySelector('.desc').value, v: row.querySelector('.amount').value });
        });
        const data = JSON.parse(localStorage.getItem('budget_data_v3') || "{}");
        data[month] = { budget: document.getElementById('startBudget').value, list: expenses };
        localStorage.setItem('budget_data_v3', JSON.stringify(data));
    }

    function loadFromStorage() {
        const month = document.getElementById('currentMonth').value;
        const data = JSON.parse(localStorage.getItem('budget_data_v3') || "{}")[month];
        const list = document.getElementById('expenseList');
        list.innerHTML = '<label>Ausgaben</label>';
        if (data) {
            document.getElementById('startBudget').value = data.budget;
            data.list.forEach(e => addNewField(e.t, e.v));
        } else {
            document.getElementById('startBudget').value = "";
            addNewField();
        }
        calculate();
    }

 function exportData() {
    const month = document.getElementById('currentMonth').value;
    const start = document.getElementById('startBudget').value || 0;
    const rest = document.getElementById('remaining').innerText;
    const date = new Date().toLocaleDateString('de-DE');

    // 1. Versteckter Header für den Import (Erste Zeile)
    let text = `###CONFIG|${month}|${start}###\n`;
    
    // 2. Schönes Layout für den Menschen
    text += `==========================================\n`;
    text += `   BUDGET BERICHT - ${month.toUpperCase()}\n`;
    text += `   Erstellt am: ${date}\n`;
    text += `==========================================\n\n`;
    text += ` STARTBUDGET:   ${parseFloat(start).toFixed(2)} €\n`;
    text += `------------------------------------------\n`;
    text += ` POSTEN          | BETRAG\n`;
    text += `------------------------------------------\n`;

    document.querySelectorAll('.expense-row').forEach(row => {
        const desc = (row.querySelector('.desc').value || "Unbenannt").padEnd(15);
        const amount = (parseFloat(row.querySelector('.amount').value) || 0).toFixed(2).padStart(8);
        text += ` ${desc} | ${amount} €\n`;
        
        // Versteckte Daten für Import am Zeilenende (unsichtbar nach viel Platz)
        text += `                                          #DATA:${row.querySelector('.desc').value};${row.querySelector('.amount').value}\n`;
    });

    text += `------------------------------------------\n`;
    text += ` RESTBETRAG:     ${rest} €\n`;
    text += `==========================================\n`;
    
    const blob = new Blob(["\uFEFF" + text], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Budget_${month}_${new Date().getFullYear()}.txt`;
    a.click();
}

    function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    
    reader.onload = function(e) {
        // 1. Inhalt lesen und das unsichtbare BOM-Zeichen sowie Leerzeichen am Anfang entfernen
        const content = e.target.result.replace(/^\uFEFF/, "").trim();
        const lines = content.split('\n');
        
        // 2. Suche nach der Konfigurationszeile (egal ob sie in Zeile 1 oder 2 steht)
        const configLine = lines.find(line => line.includes("###CONFIG") || line.includes("BUDGET_DATA"));
        
        if (!configLine) { 
            alert("Ungültige Datei: Keine Budget-Konfiguration gefunden!"); 
            return; 
        }
        
        // 3. Daten extrahieren
        // Wir splitten entweder an | oder an ###
        const parts = configLine.replace(/###/g, "").split('|');
        // parts[0] ist der Marker, parts[1] der Monat, parts[2] das Budget
        
        const month = parts[1].trim();
        const startAmount = parts[2].trim();

        document.getElementById('currentMonth').value = month;
        document.getElementById('startBudget').value = startAmount;
        
        const list = document.getElementById('expenseList');
        list.innerHTML = '<label>Ausgaben</label>';

        // 4. Suche nach den versteckten Datenzeilen (#DATA:)
        let entriesFound = 0;
        lines.forEach(line => {
            if (line.includes("#DATA:")) {
                const raw = line.split("#DATA:")[1];
                const dataParts = raw.split(';');
                if (dataParts.length >= 2) {
                    addNewField(dataParts[0].trim(), dataParts[1].trim());
                    entriesFound++;
                }
            }
        });

        // Falls keine #DATA Zeilen gefunden wurden (altes Format), versuchen wir das Semikolon-Format
        if (entriesFound === 0) {
            for (let i = 1; i < lines.length; i++) {
                if (lines[i].includes(";") && !lines[i].includes("==")) {
                    const parts = lines[i].split(';');
                    addNewField(parts[0].trim(), parts[1].trim());
                }
            }
        }

        calculate();
        alert("Daten für " + month + " erfolgreich importiert!");
    };
    reader.readAsText(file);
}

    function clearAll() {
        if (confirm("Diesen Monat wirklich zurücksetzen?")) {
            const month = document.getElementById('currentMonth').value;
            const data = JSON.parse(localStorage.getItem('budget_data_v3') || "{}");
            delete data[month];
            localStorage.setItem('budget_data_v3', JSON.stringify(data));
            location.reload();
        }
    }
</script>
</body>
</html>
