<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Planer</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">

    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231a73e8%22/><text xml:space=%22preserve%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-size=%2260%22 y=%2272%22 x=%2250%22 fill=%22white%22 font-weight=%22bold%22>€</text></svg>">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a73e8">

    <style>
        :root {
            --primary-color: #1a73e8;
            --danger-color: #d93025;
            --bg-color: #f0f2f5;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            margin: 0;
        }

        .container { 
            background: white; 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 480px; 
            box-sizing: border-box;
        }

        h1 { text-align: center; color: var(--primary-color); margin-bottom: 20px; font-size: 1.5rem; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #444; font-size: 0.9rem; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 16px; /* Verhindert Zoom auf iOS */
            outline: none;
        }

        input:focus { border-color: var(--primary-color); }

        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        
        #expenseList { margin-bottom: 15px; }

        .expense-row { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 10px; 
            align-items: center;
        }
        .expense-row input[type="text"] { flex: 3; }
        .expense-row input[type="number"] { flex: 2; }

        .btn-delete {
            background-color: #fee;
            color: var(--danger-color);
            border: 1px solid #fcc;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            min-width: 40px;
        }

        .result-box { 
            background: #e8f0fe;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
            border-left: 6px solid var(--primary-color);
        }
        .result { 
            font-size: 1.2rem; 
            font-weight: bold; 
            text-align: right; 
            color: #111; 
        }

        .btn { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: bold;
            margin-top: 10px; 
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        
        .btn-add { background-color: var(--primary-color); color: white; }
        .btn-export { background-color: #34a853; color: white; }
        .btn-clear { background-color: #f1f3f4; color: #5f6368; margin-top: 25px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Budget Tracker</h1>
    
    <div class="input-group">
        <label for="startBudget">Startbetrag (€)</label>
        <input type="number" id="startBudget" placeholder="z.B. 1000" oninput="calculate()">
    </div>

    <hr>

    <div id="expenseList">
        <label>Ausgaben</label>
        </div>

    <button class="btn btn-add" onclick="addNewField()">+ Ausgabe hinzufügen</button>

    <div class="result-box">
        <div class="result">
            Restbetrag: <span id="remaining">0.00</span> €
        </div>
    </div>

    <button class="btn btn-export" onclick="exportData()">Als .txt exportieren</button>
    <button class="btn btn-clear" onclick="clearAll()">Alle Daten zurücksetzen</button>
</div>

<script>
    // App beim Start laden
    window.onload = function() {
        loadFromStorage();
    };

    // Rechnet alles zusammen
    function calculate() {
        const startValue = parseFloat(document.getElementById('startBudget').value) || 0;
        const amounts = document.querySelectorAll('.amount');
        let totalExpenses = 0;

        amounts.forEach(input => {
            totalExpenses += parseFloat(input.value) || 0;
        });

        const remaining = startValue - totalExpenses;
        const remainingSpan = document.getElementById('remaining');
        remainingSpan.innerText = remaining.toFixed(2);
        
        // Farbe ändern wenn im Minus
        remainingSpan.style.color = remaining < 0 ? "#d93025" : "#1a73e8";

        saveToStorage();
    }

    // Fügt eine neue Zeile hinzu
    function addNewField(descValue = "", amountValue = "") {
        const container = document.getElementById('expenseList');
        const div = document.createElement('div');
        div.className = 'expense-row';
        
        div.innerHTML = `
            <input type="text" placeholder="Wofür?" class="desc" value="${descValue}" oninput="calculate()">
            <input type="number" placeholder="€" class="amount" value="${amountValue}" oninput="calculate()">
            <button class="btn-delete" onclick="removeField(this)">✕</button>
        `;
        
        container.appendChild(div);
        calculate();
    }

    // Löscht eine Zeile
    function removeField(button) {
        button.parentElement.remove();
        calculate();
    }

    // Speichert auf dem Handy
    function saveToStorage() {
        const startBudget = document.getElementById('startBudget').value;
        const descriptions = document.querySelectorAll('.desc');
        const amounts = document.querySelectorAll('.amount');
        
        const expenseData = [];
        descriptions.forEach((d, i) => {
            expenseData.push({ text: d.value, val: amounts[i].value });
        });

        localStorage.setItem('budget_app_final', JSON.stringify({
            budget: startBudget,
            list: expenseData
        }));
    }

    // Lädt vom Handy
    function loadFromStorage() {
        const saved = localStorage.getItem('budget_app_final');
        const list = document.getElementById('expenseList');
        list.innerHTML = '<label>Ausgaben</label>';

        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('startBudget').value = data.budget || "";
            if (data.list.length > 0) {
                data.list.forEach(item => addNewField(item.text, item.val));
            } else {
                addNewField();
            }
        } else {
            addNewField();
        }
        calculate();
    }

    // TXT Export
   function exportData() {
    const fileName = prompt("Name der Datei?", "Budget_Export");
    if (!fileName) return;

    const start = document.getElementById('startBudget').value || 0;
    const rest = document.getElementById('remaining').innerText;
    const descs = document.querySelectorAll('.desc');
    const amounts = document.querySelectorAll('.amount');

    let text = `MEIN BUDGET\n===========\n\nStart: ${start} €\n-----------\n`;
    descs.forEach((d, i) => {
        text += `${(d.value || "Ausgabe").padEnd(15)}: ${amounts[i].value || 0} €\n`;
    });
    text += `-----------\nREST:  ${rest} €`;

    // DER TRICK: Wir fügen das UTF-8 BOM (\uFEFF) am Anfang hinzu
    const blob = new Blob(["\uFEFF" + text], { type: 'text/plain;charset=utf-8' });
    
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fileName + ".txt";
    a.click();
    
    // Speicher wieder freigeben
    URL.revokeObjectURL(a.href);
    }

    // Reset
    function clearAll() {
        if (confirm("Möchtest du wirklich alle Einträge löschen?")) {
            localStorage.removeItem('budget_app_final');
            location.reload();
        }
    }
</script>

</body>
</html>
