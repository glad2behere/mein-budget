<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Budget Planer Pro</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f0f2f5; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 500px; 
        }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        
        /* Layout für die Ausgaben-Zeilen */
        .expense-row { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 12px; 
            align-items: center;
        }
        .expense-row input[type="text"] { flex: 3; }
        .expense-row input[type="number"] { flex: 2; }

        /* Der Lösch-Button */
        .btn-delete {
            background-color: #ffeded;
            color: #d93025;
            border: 1px solid #f8d7da;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-delete:hover { background-color: #d93025; color: white; }

        .result-box { 
            background: #e8f0fe;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 5px solid #1a73e8;
        }
        .result { 
            font-size: 1.3em; 
            font-weight: bold; 
            text-align: right; 
            color: #1a73e8; 
        }

        .btn { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1em; 
            font-weight: bold;
            margin-top: 10px; 
        }
        
        .btn-add { background-color: #1a73e8; color: white; }
        .btn-export { background-color: #34a853; color: white; }
        .btn-clear { background-color: #5f6368; color: white; margin-top: 30px; font-size: 0.85em; opacity: 0.8; }
        
        #expenseList { margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Budget Tracker</h1>
    
    <div class="input-group">
        <label for="startBudget">Startbetrag (€):</label>
        <input type="number" id="startBudget" placeholder="z.B. 1500" oninput="calculate()">
    </div>

    <hr>

    <div id="expenseList">
        <label>Deine Ausgaben:</label>
        </div>

    <button class="btn btn-add" onclick="addNewField()">+ Ausgabe hinzufügen</button>

    <div class="result-box">
        <div class="result">
            Restbetrag: <span id="remaining">0.00</span> €
        </div>
    </div>

    <button class="btn btn-export" onclick="exportData()">Als .txt exportieren</button>
    <button class="btn btn-clear" onclick="clearAll()">Alle Daten zurücksetzen</button>
</div>

<script>
    // App-Start
    window.onload = function() {
        loadFromStorage();
    };

    // Hauptberechnung
    function calculate() {
        const startValue = parseFloat(document.getElementById('startBudget').value) || 0;
        const amounts = document.querySelectorAll('.amount');
        let totalExpenses = 0;

        amounts.forEach(input => {
            totalExpenses += parseFloat(input.value) || 0;
        });

        const remaining = startValue - totalExpenses;
        document.getElementById('remaining').innerText = remaining.toFixed(2);
        
        saveToStorage();
    }

    // Neue Zeile mit Lösch-Button hinzufügen
    function addNewField(descValue = "", amountValue = "") {
        const container = document.getElementById('expenseList');
        const div = document.createElement('div');
        div.className = 'expense-row';
        
        div.innerHTML = `
            <input type="text" placeholder="Bezeichnung" class="desc" value="${descValue}" oninput="calculate()">
            <input type="number" placeholder="€" class="amount" value="${amountValue}" oninput="calculate()">
            <button class="btn-delete" onclick="removeField(this)">✕</button>
        `;
        
        container.appendChild(div);
        calculate();
    }

    // Eine einzelne Zeile löschen
    function removeField(button) {
        // Entfernt das übergeordnete div (die Zeile) des Buttons
        button.parentElement.remove();
        calculate(); // Berechne den Restbetrag neu
    }

    // Daten im Browser speichern
    function saveToStorage() {
        const startBudget = document.getElementById('startBudget').value;
        const descriptions = document.querySelectorAll('.desc');
        const amounts = document.querySelectorAll('.amount');
        
        const expenseData = [];
        descriptions.forEach((d, i) => {
            expenseData.push({ text: d.value, val: amounts[i].value });
        });

        localStorage.setItem('myBudgetApp_V2', JSON.stringify({
            budget: startBudget,
            list: expenseData
        }));
    }

    // Daten aus Browser laden
    function loadFromStorage() {
        const saved = localStorage.getItem('myBudgetApp_V2');
        const list = document.getElementById('expenseList');
        list.innerHTML = '<label>Deine Ausgaben:</label>';

        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('startBudget').value = data.budget || "";
            data.list.forEach(item => addNewField(item.text, item.val));
        } else {
            addNewField(); // Standardmäßig eine leere Zeile
        }
        calculate();
    }

    // Export Funktion
    function exportData() {
        const fileName = prompt("Dateiname für den Export?", "Budget_Bericht");
        if (!fileName) return;

        const start = document.getElementById('startBudget').value || 0;
        const rest = document.getElementById('remaining').innerText;
        const descs = document.querySelectorAll('.desc');
        const amounts = document.querySelectorAll('.amount');

        let text = `BUDGET EXPORT\n`;
        text += `--------------------------\n`;
        text += `Startbudget:  ${start} €\n`;
        text += `--------------------------\n`;
        descs.forEach((d, i) => {
            text += `${(d.value || "Ausgabe").padEnd(15)}: ${amounts[i].value || 0} €\n`;
        });
        text += `--------------------------\n`;
        text += `RESTBETRAG:   ${rest} €\n`;

        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = fileName + ".txt";
        a.click();
    }

    function clearAll() {
        if (confirm("Wirklich alles löschen?")) {
            localStorage.removeItem('myBudgetApp_V2');
            location.reload();
        }
    }
</script>

</body>
</html>
