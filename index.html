<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Manager Pro</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231a73e8%22/><text xml:space=%22preserve%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-size=%2260%22 y=%2272%22 x=%2250%22 fill=%22white%22 font-weight=%22bold%22>€</text></svg>">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" id="theme-color-meta" content="#1a73e8">

    <style>
        /* CSS Variablen für einfaches Theme-Switching */
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1a1a1a;
            --primary: #1a73e8;
            --danger: #d93025;
            --input-border: #cccccc;
            --secondary-btn: #f1f3f4;
            --secondary-text: #5f6368;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --primary: #8ab4f8;
            --danger: #f28b82;
            --input-border: #444444;
            --secondary-btn: #333333;
            --secondary-text: #aaaaaa;
        }

        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); padding: 15px; display: flex; justify-content: center; margin: 0; transition: background 0.3s; }
        .container { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); width: 100%; max-width: 480px; box-sizing: border-box; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; color: var(--primary); font-size: 1.4rem; }
        
        .settings-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text); }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.85rem; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--input-border); border-radius: 10px; background: var(--card); color: var(--text); box-sizing: border-box; font-size: 16px; outline: none; }
        
        /* Fortschrittsbalken Style */
        .progress-container { width: 100%; height: 12px; background: #eee; border-radius: 6px; margin: 10px 0; overflow: hidden; }
        #progress-bar { height: 100%; width: 100%; background: #34a853; transition: width 0.5s, background 0.5s; }
        [data-theme="dark"] .progress-container { background: #333; }

        .expense-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .expense-row input[type="text"] { flex: 3; }
        .expense-row input[type="number"] { flex: 2; }

        .btn-delete { background: var(--danger); color: white; border: none; border-radius: 8px; padding: 10px; cursor: pointer; opacity: 0.8; }

        .result-box { background: var(--secondary-btn); padding: 15px; border-radius: 12px; margin-top: 10px; }
        .result { font-size: 1.1rem; font-weight: bold; text-align: right; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: bold; margin-top: 10px; transition: opacity 0.2s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-export { background: #34a853; color: white; }
        .btn-clear { background: var(--secondary-btn); color: var(--secondary-text); margin-top: 20px; font-size: 0.8rem; }
        
        /* Modal für Einstellungen */
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 16px; width: 80%; max-width: 300px; text-align: center; }

        #fileImport { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <h1>Budget Manager</h1>
        <button class="settings-btn" onclick="toggleModal(true)">⚙️</button>
    </div>
    
    <div class="input-group">
        <label>Monat & Startbetrag (€)</label>
        <div style="display: flex; gap: 10px;">
            <select id="currentMonth" onchange="loadFromStorage()">
                <option>Januar</option><option>Februar</option><option>März</option>
                <option>April</option><option>Mai</option><option>Juni</option>
                <option>Juli</option><option>August</option><option>September</option>
                <option>Oktober</option><option>November</option><option>Dezember</option>
            </select>
            <input type="number" id="startBudget" placeholder="0" oninput="calculate()">
        </div>
    </div>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div class="result-box">
        <div class="result">Rest: <span id="remaining">0.00</span> €</div>
    </div>

    <hr style="border:0; border-top:1px solid var(--input-border); margin: 20px 0;">
    
    <div id="expenseList"><label>Ausgaben</label></div>

    <button class="btn btn-add" onclick="addNewField()">+ Ausgabe hinzufügen</button>

    <button class="btn btn-export" onclick="exportData()">Als .txt exportieren</button>
    <button class="btn btn-clear" onclick="clearAll()">Monat zurücksetzen</button>
</div>

<div id="settings-modal" onclick="toggleModal(false)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Einstellungen</h3>
        <button class="btn" id="theme-toggle" onclick="toggleTheme()">Dark Mode: AUS</button>
        <button class="btn" style="background: #fbbc04; color:black;" onclick="document.getElementById('fileImport').click()">TXT Importieren</button>
        <input type="file" id="fileImport" accept=".txt" onchange="importData(event)">
        <button class="btn btn-clear" onclick="toggleModal(false)">Schließen</button>
    </div>
</div>

<script>
    window.onload = () => {
        const months = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
        document.getElementById('currentMonth').value = months[new Date().getMonth()];
        
        // Theme laden
        if(localStorage.getItem('theme') === 'dark') toggleTheme(true);
        loadFromStorage();
    };

    function toggleModal(show) {
        document.getElementById('settings-modal').style.display = show ? 'flex' : 'none';
    }

    function toggleTheme(init = false) {
        const body = document.body;
        const current = body.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        
        if(!init) body.setAttribute('data-theme', next);
        else body.setAttribute('data-theme', 'dark');
        
        const isDark = body.getAttribute('data-theme') === 'dark';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.getElementById('theme-toggle').innerText = "Dark Mode: " + (isDark ? "AN" : "AUS");
        document.getElementById('theme-color-meta').setAttribute('content', isDark ? '#121212' : '#1a73e8');
    }

    function calculate() {
        const start = parseFloat(document.getElementById('startBudget').value) || 0;
        const amounts = document.querySelectorAll('.amount');
        let total = 0;
        amounts.forEach(i => total += parseFloat(i.value) || 0);
        
        const rem = start - total;
        document.getElementById('remaining').innerText = rem.toFixed(2);
        
        // Balken berechnen
        const bar = document.getElementById('progress-bar');
        let percent = start > 0 ? (rem / start) * 100 : 0;
        percent = Math.max(0, Math.min(100, percent)); // Zwischen 0 und 100 halten
        
        bar.style.width = percent + "%";
        
        // Farbe des Balkens & Textes ändern
        if (percent > 50) bar.style.background = "#34a853"; // Grün
        else if (percent > 15) bar.style.background = "#fbbc04"; // Gelb
        else bar.style.background = "#d93025"; // Rot
        
        document.getElementById('remaining').style.color = rem < 0 ? "#d93025" : "inherit";
        saveToStorage();
    }

    function addNewField(desc = "", val = "") {
        const div = document.createElement('div');
        div.className = 'expense-row';
        div.innerHTML = `<input type="text" placeholder="Bezeichnung" class="desc" value="${desc}" oninput="calculate()">
                         <input type="number" placeholder="€" class="amount" value="${val}" oninput="calculate()">
                         <button class="btn-delete" onclick="this.parentElement.remove();calculate();">✕</button>`;
        document.getElementById('expenseList').appendChild(div);
    }

    function saveToStorage() {
        const month = document.getElementById('currentMonth').value;
        const expenses = [];
        document.querySelectorAll('.expense-row').forEach(row => {
            expenses.push({ t: row.querySelector('.desc').value, v: row.querySelector('.amount').value });
        });
        const data = JSON.parse(localStorage.getItem('budget_data_v4') || "{}");
        data[month] = { budget: document.getElementById('startBudget').value, list: expenses };
        localStorage.setItem('budget_data_v4', JSON.stringify(data));
    }

    function loadFromStorage() {
        const month = document.getElementById('currentMonth').value;
        const data = JSON.parse(localStorage.getItem('budget_data_v4') || "{}")[month];
        const list = document.getElementById('expenseList');
        list.innerHTML = '<label>Ausgaben</label>';
        if (data) {
            document.getElementById('startBudget').value = data.budget;
            if(data.list.length > 0) data.list.forEach(e => addNewField(e.t, e.v));
            else addNewField();
        } else {
            document.getElementById('startBudget').value = "";
            addNewField();
        }
        calculate();
    }

    function exportData() {
        const month = document.getElementById('currentMonth').value;
        const start = document.getElementById('startBudget').value || 0;
        const rest = document.getElementById('remaining').innerText;
        let text = `###CONFIG|${month}|${start}###\n`;
        text += `BERICHT: ${month}\n-----------------\n`;
        document.querySelectorAll('.expense-row').forEach(row => {
            const t = row.querySelector('.desc').value || "Unbekannt";
            const v = row.querySelector('.amount').value || 0;
            text += `${t.padEnd(15)}: ${v} € #DATA:${t};${v}\n`;
        });
        text += `-----------------\nREST: ${rest} €`;
        
        const blob = new Blob(["\uFEFF" + text], { type: 'text/plain;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Budget_${month}.txt`;
        a.click();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.replace(/^\uFEFF/, "").split('\n');
            const configLine = lines.find(l => l.includes("###CONFIG"));
            if (!configLine) { alert("Format nicht erkannt!"); return; }
            const config = configLine.replace(/###/g, "").split('|');
            document.getElementById('currentMonth').value = config[1];
            document.getElementById('startBudget').value = config[2];
            const list = document.getElementById('expenseList');
            list.innerHTML = '<label>Ausgaben</label>';
            lines.forEach(l => {
                if (l.includes("#DATA:")) {
                    const d = l.split("#DATA:")[1].split(';');
                    addNewField(d[0], d[1]);
                }
            });
            calculate();
            toggleModal(false);
            alert("Import für " + config[1] + " fertig!");
        };
        reader.readAsText(file);
    }

    function clearAll() {
        if (confirm("Monat wirklich leeren?")) {
            const month = document.getElementById('currentMonth').value;
            const data = JSON.parse(localStorage.getItem('budget_data_v4') || "{}");
            delete data[month];
            localStorage.setItem('budget_data_v4', JSON.stringify(data));
            location.reload();
        }
    }
</script>
</body>
</html>
