<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Manager Pro CSV</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231a73e8%22/><text xml:space=%22preserve%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-size=%2260%22 y=%2272%22 x=%2250%22 fill=%22white%22 font-weight=%22bold%22>€</text></svg>">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" id="theme-color-meta" content="#1a73e8">

    <style>
        :root {
            --bg: #f0f2f5; --card: #ffffff; --text: #1a1a1a; --primary: #1a73e8;
            --danger: #d93025; --success: #34a853; --input-border: #cccccc;
            --secondary-btn: #f1f3f4; --secondary-text: #5f6368;
        }

        [data-theme="dark"] {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --primary: #8ab4f8;
            --danger: #f28b82; --success: #81c995; --input-border: #444444;
            --secondary-btn: #333333; --secondary-text: #aaaaaa;
        }

        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); padding: 15px; display: flex; justify-content: center; margin: 0; transition: background 0.3s; }
        .container { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); width: 100%; max-width: 480px; box-sizing: border-box; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; color: var(--primary); font-size: 1.4rem; }
        
        .settings-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text); }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; color: var(--primary); }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--input-border); border-radius: 10px; background: var(--card); color: var(--text); box-sizing: border-box; font-size: 16px; outline: none; }
        
        .progress-container { width: 100%; height: 12px; background: #eee; border-radius: 6px; margin: 15px 0; overflow: hidden; }
        #progress-bar { height: 100%; width: 100%; background: var(--success); transition: width 0.5s, background 0.5s; }

        .row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .row input[type="text"] { flex: 3; }
        .row input[type="number"] { flex: 2; }

        .btn-delete { background: var(--danger); color: white; border: none; border-radius: 8px; padding: 10px; cursor: pointer; font-weight: bold; }

        .summary-box { background: var(--secondary-btn); padding: 15px; border-radius: 12px; margin: 15px 0; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .result-box { background: var(--primary); color: white; padding: 15px; border-radius: 12px; margin-top: 10px; text-align: center; }
        .result { font-size: 1.3rem; font-weight: bold; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: bold; margin-top: 8px; }
        .btn-add-inc { background: var(--success); color: white; }
        .btn-add-exp { background: var(--primary); color: white; }
        
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 16px; width: 85%; max-width: 320px; }

        #fileImport { display: none; }
        hr { border: 0; border-top: 1px solid var(--input-border); margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <h1>Budget Manager</h1>
        <button class="settings-btn" onclick="toggleModal(true)">⚙️</button>
    </div>
    
    <div class="input-group">
        <label>Monat wählen</label>
        <select id="currentMonth" onchange="loadFromStorage()">
            <option>Januar</option><option>Februar</option><option>März</option>
            <option>April</option><option>Mai</option><option>Juni</option>
            <option>Juli</option><option>August</option><option>September</option>
            <option>Oktober</option><option>November</option><option>Dezember</option>
        </select>
    </div>

    <label>Einnahmen</label>
    <div id="incomeList"></div>
    <button class="btn btn-add-inc" onclick="addRow('incomeList')">+ Einnahme hinzufügen</button>

    <hr>

    <label>Ausgaben</label>
    <div id="expenseList"></div>
    <button class="btn btn-add-exp" onclick="addRow('expenseList')">+ Ausgabe hinzufügen</button>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div class="summary-box">
        <span>Einnahmen: <b id="totalInc">0.00</b> €</span>
        <span>Ausgaben: <b id="totalExp">0.00</b> €</span>
    </div>

    <div class="result-box" id="resBox">
        <div>Übriges Budget</div>
        <div class="result"><span id="remaining">0.00</span> €</div>
    </div>
</div>

<div id="settings-modal" onclick="toggleModal(false)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin-top:0">Einstellungen</h3>
        <button class="btn" style="background:var(--secondary-btn); color:var(--text)" onclick="toggleTheme()">Theme wechseln</button>
        <button class="btn" style="background: #34a853; color:white;" onclick="exportCSV()">Als CSV exportieren</button>
        <button class="btn" style="background: #fbbc04; color:black;" onclick="document.getElementById('fileImport').click()">CSV Importieren</button>
        <input type="file" id="fileImport" accept=".txt,.csv" onchange="importCSV(event)">
        <button class="btn" style="background: var(--danger); color:white; margin-top:20px" onclick="clearAll()">Monat zurücksetzen</button>
        <button class="btn" style="background:none; color:var(--secondary-text)" onclick="toggleModal(false)">Schließen</button>
    </div>
</div>

<script>
    window.onload = () => {
        const months = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
        document.getElementById('currentMonth').value = months[new Date().getMonth()];
        if(localStorage.getItem('theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
        loadFromStorage();
    };

    function toggleModal(show) { document.getElementById('settings-modal').style.display = show ? 'flex' : 'none'; }

    function toggleTheme() {
        const body = document.body;
        const next = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        document.getElementById('theme-color-meta').setAttribute('content', next === 'dark' ? '#121212' : '#1a73e8');
    }

    function addRow(containerId, desc = "", val = "") {
        const div = document.createElement('div');
        div.className = 'row';
        div.innerHTML = `<input type="text" placeholder="Bezeichnung" class="desc" value="${desc}" oninput="calculate()">
                         <input type="number" placeholder="€" class="amount" value="${val}" oninput="calculate()">
                         <button class="btn-delete" onclick="this.parentElement.remove();calculate();">✕</button>`;
        document.getElementById(containerId).appendChild(div);
        if(!desc && !val) calculate();
    }

    function calculate() {
        let inc = 0, exp = 0;
        document.querySelectorAll('#incomeList .amount').forEach(i => inc += parseFloat(i.value) || 0);
        document.querySelectorAll('#expenseList .amount').forEach(i => exp += parseFloat(i.value) || 0);
        
        const rem = inc - exp;
        document.getElementById('totalInc').innerText = inc.toFixed(2);
        document.getElementById('totalExp').innerText = exp.toFixed(2);
        document.getElementById('remaining').innerText = rem.toFixed(2);
        
        const bar = document.getElementById('progress-bar');
        let percent = inc > 0 ? (rem / inc) * 100 : 0;
        percent = Math.max(0, Math.min(100, percent));
        bar.style.width = percent + "%";
        
        if (percent > 50) bar.style.background = "var(--success)";
        else if (percent > 15) bar.style.background = "#fbbc04";
        else bar.style.background = "var(--danger)";
        
        document.getElementById('resBox').style.background = rem < 0 ? "var(--danger)" : "var(--primary)";
        saveToStorage();
    }

    function saveToStorage() {
        const month = document.getElementById('currentMonth').value;
        const getItems = (id) => Array.from(document.querySelectorAll(`#${id} .row`)).map(r => ({
            t: r.querySelector('.desc').value, v: r.querySelector('.amount').value
        }));
        const data = JSON.parse(localStorage.getItem('budget_csv_v1') || "{}");
        data[month] = { inc: getItems('incomeList'), exp: getItems('expenseList') };
        localStorage.setItem('budget_csv_v1', JSON.stringify(data));
    }

    function loadFromStorage() {
        const month = document.getElementById('currentMonth').value;
        const data = JSON.parse(localStorage.getItem('budget_csv_v1') || "{}")[month];
        document.getElementById('incomeList').innerHTML = "";
        document.getElementById('expenseList').innerHTML = "";
        if (data) {
            data.inc.forEach(e => addRow('incomeList', e.t, e.v));
            data.exp.forEach(e => addRow('expenseList', e.t, e.v));
        } else {
            addRow('incomeList'); addRow('expenseList');
        }
        calculate();
    }

    // EXPORT ALS CSV
    function exportCSV() {
        const month = document.getElementById('currentMonth').value;
        // Metadaten für App-Import in der ersten Zeile
        let csvContent = `###APP_DATA|${month}###\n`;
        // CSV Header für Excel
        csvContent += `Typ;Bezeichnung;Betrag\n`;
        
        document.querySelectorAll('#incomeList .row').forEach(r => {
            csvContent += `Einnahme;${r.querySelector('.desc').value || "Unbenannt"};${r.querySelector('.amount').value || 0}\n`;
        });
        document.querySelectorAll('#expenseList .row').forEach(r => {
            csvContent += `Ausgabe;${r.querySelector('.desc').value || "Unbenannt"};${r.querySelector('.amount').value || 0}\n`;
        });

        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Budget_${month}.csv`;
        a.click();
    }

    // IMPORT VON CSV
    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result.replace(/^\uFEFF/, "").trim();
            const lines = content.split('\n');
            
            if (!lines[0].includes("###APP_DATA")) {
                alert("Keine gültige Budget-CSV!");
                return;
            }

            const month = lines[0].split('|')[1].replace('###','');
            document.getElementById('currentMonth').value = month;
            document.getElementById('incomeList').innerHTML = "";
            document.getElementById('expenseList').innerHTML = "";

            // Ab Zeile 3 starten (Zeile 1=Meta, Zeile 2=Header)
            for (let i = 2; i < lines.length; i++) {
                const parts = lines[i].split(';');
                if (parts.length < 3) continue;
                
                const typ = parts[0].trim();
                const desc = parts[1].trim();
                const val = parts[2].trim();

                if (typ === "Einnahme") addRow('incomeList', desc, val);
                else if (typ === "Ausgabe") addRow('expenseList', desc, val);
            }
            calculate();
            toggleModal(false);
            alert("Daten für " + month + " importiert!");
        };
        reader.readAsText(file);
    }

    function clearAll() {
        if (confirm("Monat wirklich leeren?")) {
            const month = document.getElementById('currentMonth').value;
            const data = JSON.parse(localStorage.getItem('budget_csv_v1') || "{}");
            delete data[month];
            localStorage.setItem('budget_csv_v1', JSON.stringify(data));
            location.reload();
        }
    }
</script>
</body>
</html>
